services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-diagnostic_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-diagnostic_center}
    volumes:
      - db_data:/var/lib/postgresql/data
    # Only bind to localhost — do not expose 5432 publicly. Useful for
    # running `prisma studio` or `psql` from the VPS itself.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-diagnostic_app} -d ${POSTGRES_DB:-diagnostic_center}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - reports_data:/app/storage/reports
    # Bind to localhost only — put Nginx (or another reverse proxy) in front
    # for public TLS traffic. Do not expose 3000 on 0.0.0.0 in production.
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  db_data:
  reports_data:
